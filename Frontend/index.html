<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Silpakorn Map</title>
    <link rel="icon" type="image/x-icon" href="./assets/silpakorn-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="map-control top-left-logo">
        <img src="./assets/silpakorn-icon.png" alt="Silpakorn Logo">
        <strong data-i18n="navTitle">Silpakorn Map</strong>
    </div>

    <div class="map-control top-right-search">
        <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Search places..."
            onkeyup="searchMarkers()">
        <span class="search-icon">🔍</span>
    </div>

    <div class="map-control bottom-left-controls">
        <label class="toggle-label">
            <span data-i18n="satellite">Satellite</span>
            <div class="toggle-wrapper">
                <input type="checkbox" id="satelliteToggle" class="sr-only" onchange="toggleSatelliteMode()">
                <div id="satToggleTrack" class="toggle-track"></div>
                <div id="satToggleDot" class="toggle-dot"></div>
            </div>
        </label>

        <label class="toggle-label">
            <span data-i18n="darkMode">Dark Mode</span>
            <div class="toggle-wrapper">
                <input type="checkbox" id="darkModeToggle" class="sr-only" onchange="toggleDarkMode()">
                <div id="toggleTrack" class="toggle-track"></div>
                <div id="toggleDot" class="toggle-dot"></div>
            </div>
        </label>

        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="th">ภาษาไทย</option>
            <option value="cn">中文</option>
        </select>
    </div>

    <div id="map"></div>

    <script src="script.js"></script>
</body>

</html>
